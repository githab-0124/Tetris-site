```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TetrisUltimate-PRO</title>

<style>

body{
margin:0;
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin:10px;
font-size:32px;
color:#00eaff;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#00eaff;
font-weight:bold;
cursor:pointer;
}

.wrapper{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

canvas{
background:#111;
border-radius:10px;
box-shadow:0 0 15px cyan;
}

.panel{
background:#1c2233;
padding:10px;
border-radius:10px;
min-width:140px;
}

.controls{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

</style>
</head>

<body>

<h1>TetrisUltimate-PRO</h1>

<div id="menu">
<button onclick="startGame()">PLAY</button>
<button onclick="startAI()">AI DEMO</button>
</div>

<div id="ui" style="display:none">

<div class="wrapper">

<canvas id="game" width="300" height="600"></canvas>

<div class="panel">

<div>Score <span id="score">0</span></div>
<div>Level <span id="level">1</span></div>
<div>High <span id="high">0</span></div>

<h3>Next</h3>
<canvas id="next" width="120" height="220"></canvas>

<h3>Hold</h3>
<canvas id="hold" width="120" height="120"></canvas>

<div>Combo <span id="combo">0</span></div>

</div>

</div>

</div>

<div class="controls">
<button onclick="move(-1)">◀</button>
<button onclick="move(1)">▶</button>
<button onclick="rotate()">⟳</button>
<button onclick="softDrop()">▼</button>
<button onclick="hardDrop()">DROP</button>
<button onclick="holdPiece()">HOLD</button>
</div>

<script>

const COLS=10
const ROWS=20
const SIZE=30

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const nextCtx=document.getElementById("next").getContext("2d")
const holdCtx=document.getElementById("hold").getContext("2d")

let board
let current
let queue=[]
let hold=null
let canHold=true

let score=0
let level=1
let lines=0
let combo=0

let dropInterval=1000
let dropCounter=0
let lastTime=0

let running=false
let ai=false

let highScore=localStorage.getItem("tetrisHigh")||0
document.getElementById("high").textContent=highScore

const colors={
I:"#00ffff",
O:"#ffff00",
T:"#cc00ff",
S:"#00ff00",
Z:"#ff0000",
J:"#0066ff",
L:"#ff9900"
}

const pieces={
I:[[1,1,1,1]],
O:[[1,1],[1,1]],
T:[[0,1,0],[1,1,1]],
S:[[0,1,1],[1,1,0]],
Z:[[1,1,0],[0,1,1]],
J:[[1,0,0],[1,1,1]],
L:[[0,0,1],[1,1,1]]
}

function newBag(){

let bag=["I","O","T","S","Z","J","L"]

for(let i=bag.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
;[bag[i],bag[j]]=[bag[j],bag[i]]
}

queue.push(...bag)

}

function spawn(){

if(queue.length<5) newBag()

let type=queue.shift()

current={
type:type,
x:3,
y:0,
shape:JSON.parse(JSON.stringify(pieces[type]))
}

canHold=true
drawNext()

}

function startGame(){
ai=false
init()
}

function startAI(){
ai=true
init()
}

function init(){

document.getElementById("menu").style.display="none"
document.getElementById("ui").style.display="block"

board=Array.from({length:ROWS},()=>Array(COLS).fill(0))

score=0
level=1
lines=0
combo=0

spawn()

running=true
requestAnimationFrame(update)

}

function collide(dx=0,dy=0,shape=current.shape){

for(let y=0;y<shape.length;y++){
for(let x=0;x<shape[y].length;x++){

if(shape[y][x]){

let nx=current.x+x+dx
let ny=current.y+y+dy

if(nx<0||nx>=COLS||ny>=ROWS||board[ny]?.[nx]) return true

}

}
}

return false

}

function move(d){
if(!collide(d,0)) current.x+=d
}

function rotate(){

let s=current.shape
let r=s[0].map((_,i)=>s.map(row=>row[i]).reverse())

if(!collide(0,0,r)) current.shape=r

}

function softDrop(){

if(!collide(0,1)){
current.y++
}else{
merge()
clearLines()
spawn()
}

}

function hardDrop(){

while(!collide(0,1)){
current.y++
score+=2
}

softDrop()

}

function holdPiece(){

if(!canHold) return

if(!hold){
hold=current.type
spawn()
}else{
[current.type,hold]=[hold,current.type]
current.shape=JSON.parse(JSON.stringify(pieces[current.type]))
current.x=3
current.y=0
}

canHold=false
drawHold()

}

function merge(){

current.shape.forEach((row,y)=>row.forEach((v,x)=>{
if(v) board[current.y+y][current.x+x]=colors[current.type]
}))

}

function clearLines(){

let cleared=0

board=board.filter(r=>!r.every(c=>c))

while(board.length<ROWS){
board.unshift(Array(COLS).fill(0))
cleared++
}

if(cleared){

combo++
lines+=cleared
score+=cleared*100*level + combo*50
level=Math.floor(lines/10)+1
dropInterval=1000-level*70

}else{
combo=0
}

document.getElementById("score").textContent=score
document.getElementById("level").textContent=level
document.getElementById("combo").textContent=combo

if(score>highScore){
highScore=score
localStorage.setItem("tetrisHigh",score)
document.getElementById("high").textContent=score
}

}

function drawCell(x,y,color,alpha=1){

ctx.globalAlpha=alpha
ctx.fillStyle=color
ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE)
ctx.strokeStyle="#000"
ctx.strokeRect(x*SIZE,y*SIZE,SIZE,SIZE)
ctx.globalAlpha=1

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

board.forEach((row,y)=>row.forEach((v,x)=>{
if(v) drawCell(x,y,v)
}))

drawGhost()
drawPiece()

}

function drawPiece(){

current.shape.forEach((row,y)=>row.forEach((v,x)=>{
if(v) drawCell(current.x+x,current.y+y,colors[current.type])
}))

}

function drawGhost(){

let ghostY=current.y

while(!collide(0,ghostY-current.y+1)) ghostY++

current.shape.forEach((row,y)=>row.forEach((v,x)=>{
if(v) drawCell(current.x+x,ghostY+y,colors[current.type],0.3)
}))

}

function drawNext(){

nextCtx.clearRect(0,0,120,220)

for(let i=0;i<5;i++){

let type=queue[i]
if(!type) continue

pieces[type].forEach((row,y)=>row.forEach((v,x)=>{
if(v){
nextCtx.fillStyle=colors[type]
nextCtx.fillRect(x*20+40,y*20+30+i*40,20,20)
}
}))

}

}

function drawHold(){

holdCtx.clearRect(0,0,120,120)

if(!hold) return

pieces[hold].forEach((row,y)=>row.forEach((v,x)=>{
if(v){
holdCtx.fillStyle=colors[hold]
holdCtx.fillRect(x*20+40,y*20+40,20,20)
}
}))

}

function update(time=0){

if(!running) return

let delta=time-lastTime
lastTime=time

dropCounter+=delta

if(dropCounter>dropInterval){
softDrop()
dropCounter=0
}

if(ai) aiMove()

draw()

requestAnimationFrame(update)

}

function aiMove(){

if(Math.random()<0.3) move(Math.random()<0.5?-1:1)
if(Math.random()<0.2) rotate()
if(Math.random()<0.05) hardDrop()

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft") move(-1)
if(e.key==="ArrowRight") move(1)
if(e.key==="ArrowDown") softDrop()
if(e.key==="ArrowUp") rotate()
if(e.key===" ") hardDrop()
if(e.key==="c") holdPiece()

})

</script>

</body>
</html>
